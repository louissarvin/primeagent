# CI for the PrimeAgent monorepo.
#
# Three independent jobs run in parallel on every push and pull_request:
#   1. contracts: forge fmt, build, and tests (excludes forked tests).
#   2. backend:   bun install, tsc --noEmit, bun test.
#   3. web:       bun install, tsc --noEmit, vite build.
#
# Submodule note: contracts/lib/forge-std is NOT a git submodule in this repo;
# it is vendored under contracts/lib/. No submodules: 'recursive' flag is
# required on checkout. If forge-std is ever moved to a submodule, add
# `submodules: recursive` to the actions/checkout step in the contracts job.
#
# Database note: the backend job does NOT run `bun db:push`. The Prisma schema
# requires a live Postgres instance, which CI does not provision. Schema
# changes are validated locally by the developer before commit.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: contracts (foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache forge dependencies
        uses: actions/cache@v4
        with:
          path: |
            contracts/lib
            contracts/cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: forge fmt --check
        run: forge fmt --check

      - name: forge build --sizes
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv --no-match-path "test/fork/**"

  backend:
    name: backend (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-backend-${{ hashFiles('backend/bun.lockb', 'backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-backend-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  web:
    name: web (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lockb', 'web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
