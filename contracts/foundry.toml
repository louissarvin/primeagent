# Foundry config for PrimeAgent contracts workspace.
# Source of truth: PrimeAgent.md section 20.
# Pins: solc 0.8.35 stable, evm_version cancun (Arbitrum does not support osaka).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
broadcast = "broadcast"
solc = "0.8.35"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read-write", path = "./" }]
verbosity = 2
gas_reports = ["AgentVault", "PrimeAgentFactory", "PriceOracle"]

[profile.test]
verbosity = 3
fuzz = { runs = 1000, seed = "0x1" }
invariant = { runs = 256, depth = 32, fail_on_revert = false }

[profile.ci]
verbosity = 3
fuzz = { runs = 5000 }
invariant = { runs = 1024, depth = 200, fail_on_revert = false }

[profile.fork]
verbosity = 3
fuzz = { runs = 256 }
no_match_path = "test/{unit,invariants}/**"

[profile.slither]
optimizer = false
via_ir = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
multiline_func_header = "all"
single_line_statement_blocks = "preserve"
override_spacing = false
wrap_comments = false
ignore = ["lib/**", "out/**", "cache/**"]

[rpc_endpoints]
arbitrum_one = "${ARB_ONE_RPC}"
arbitrum_sepolia = "${ARB_SEPOLIA_RPC}"
rh_chain = "${RH_CHAIN_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
arbitrum_one = { key = "${ARBISCAN_API_KEY}", chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
rh_chain = { key = "${RH_CHAIN_EXPLORER_API_KEY}", chain = 46630, url = "${RH_CHAIN_EXPLORER_API}" }

[doc]
title = "PrimeAgent Contracts"
out = "docs"
